name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_221_PREFIX: /usr/lib/llvm-22
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: /usr/lib/llvm-22
          key: llvm-22-${{ runner.os }}

      - name: Install LLVM 22
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y llvm-22-dev libclang-22-dev

      - name: Set LLVM environment
        run: |
          echo "/usr/lib/llvm-22/bin" >> $GITHUB_PATH

      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all -- --check
      - run: python3 scripts/check_file_sizes.py
