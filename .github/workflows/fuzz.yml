name: Fuzz Testing
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 0 * * 0'  # weekly

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [fuzz_lexer, fuzz_parser, fuzz_typeck, fuzz_lower]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzz target (${{ matrix.target }})
        run: |
          cd fuzz
          cargo fuzz run ${{ matrix.target }} -- -max_total_time=600
