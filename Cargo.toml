[workspace]
resolver = "2"
members = [
    "crates/glyim-interner",
    "crates/glyim-diag",
    "crates/glyim-syntax",
    "crates/glyim-lex",
    "crates/glyim-parse",
    "crates/glyim-hir",
    "crates/glyim-typeck",
    "crates/glyim-macro-core",
    "crates/glyim-macro-vfs",
    "crates/glyim-codegen-llvm",
    "crates/glyim-pkg",
    "crates/glyim-cli",
]

[workspace.package]
version = "0.4.0"
edition = "2021"
license = "MIT"
rust-version = "1.75.0"
