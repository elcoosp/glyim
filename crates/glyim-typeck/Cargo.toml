[package]
name = "glyim-typeck"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Type checker and MacroContext implementation for Glyim"

[dependencies]
similar = "2"
tracing = { version = "0.1", features = ["attributes"] }
miette = { version = "7", features = ["fancy-no-backtrace"] }
miette-derive = "7"
thiserror = "2"
glyim-hir = { path = "../glyim-hir" }
glyim-diag = { path = "../glyim-diag" }
glyim-interner = { path = "../glyim-interner" }

[dev-dependencies]
proptest = "1"
rstest = "0.24"
insta = { version = "1", features = ["yaml"] }
glyim-parse = { path = "../glyim-parse" }
glyim-diag = { path = "../glyim-diag" }
